services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
      POSTGRES_DB: market
    ports:
      - "5432:5432"
    volumes:
      - ./migrations/up:/docker-entrypoint-initdb.d:ro
  oracle:
    build:
      context: .
      dockerfile: Dockerfile.oracle
    ports:
      - "8090:8090"
